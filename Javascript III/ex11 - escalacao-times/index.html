<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escalação de time</title>
</head>
<body>
    <section class="secao-adicionar-jogador">
        <label for="nome-jogador">Nome do jogador:</label>
        <input type="text" id="nome-jogador">

        <label for="posicao-jogador">Posição do jogador:</label>
        <input type="text" id="posicao-jogador">

        <label for="numero-camisa">Número da camisa:</label>
        <input type="number" id="numero-camisa">
        <br><br>
        <button id="botao-escalar-jogador" onclick="escalarJogador()">Escalar Jogador</button>
    </section>

    <hr>

    <section class="secao-remover-jogador">
        <label for="numero-remover-jogador">Número da camisa:</label>
        <input type="number" id="numero-remover-jogador"><br>
        <br>
        <button id="botao-remover-jogador" onclick="removerJogador()">Remover Jogador</button>
    </section>
    
    <hr>

    <section class="secao-escalacao-time">
        <ul class="escalacao-time">
            
        </ul>
    </section>


    <script src="escalacao-time.js"></script>
</body>
</html>
